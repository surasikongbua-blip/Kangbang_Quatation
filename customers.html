<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>จัดการลูกค้า — Kang Bang</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
  <style>body { font-family: 'Sarabun', sans-serif; }</style>
</head>
<body class="bg-gray-50 min-h-screen">

  <!-- Navbar -->
  <nav class="bg-green-800 text-white shadow-lg sticky top-0 z-10">
    <div class="max-w-7xl mx-auto px-4 py-3 flex items-center justify-between">
      <div class="flex items-center gap-3">
        <a href="dashboard.html" class="text-green-300 hover:text-white transition">← กลับ</a>
        <span class="text-green-500">|</span>
        <span class="text-2xl">👥</span>
        <span class="font-bold">จัดการลูกค้า</span>
      </div>
      <button onclick="logout()" class="text-sm bg-green-700 hover:bg-green-600 px-3 py-1.5 rounded-lg transition">ออกจากระบบ</button>
    </div>
  </nav>

  <div class="max-w-5xl mx-auto px-4 py-6">

    <!-- Header -->
    <div class="flex items-center justify-between mb-6">
      <div>
        <h1 class="text-2xl font-bold text-gray-800">ฐานข้อมูลลูกค้า</h1>
        <p class="text-gray-500 text-sm">ของคุณ — ลูกค้าแต่ละคนใช้เบอร์โทรเป็นรหัส</p>
      </div>
      <button onclick="openModal()"
        class="flex items-center gap-2 px-4 py-2 bg-green-700 text-white rounded-xl hover:bg-green-800 transition text-sm font-medium">
        + เพิ่มลูกค้า
      </button>
    </div>

    <!-- Search -->
    <div class="bg-white rounded-xl shadow-sm border border-gray-100 p-4 mb-4">
      <input id="search" type="text" placeholder="ค้นหาเบอร์โทร หรือชื่อลูกค้า..."
        class="w-full px-4 py-2 border border-gray-200 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-green-500"
        oninput="filterCustomers()"/>
    </div>

    <!-- Alert -->
    <div id="alert" class="hidden mb-4 px-4 py-3 rounded-lg text-sm"></div>

    <!-- Table (Desktop) / Cards (Mobile) -->
    <div class="bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden">
      <!-- Desktop -->
      <div class="hidden sm:block overflow-x-auto">
        <table class="w-full text-sm">
          <thead>
            <tr class="bg-gray-50 border-b border-gray-100">
              <th class="text-left px-4 py-3 text-gray-500 font-medium">เบอร์โทร (รหัส)</th>
              <th class="text-left px-4 py-3 text-gray-500 font-medium">ชื่อลูกค้า</th>
              <th class="text-left px-4 py-3 text-gray-500 font-medium hidden md:table-cell">ที่อยู่</th>
              <th class="text-left px-4 py-3 text-gray-500 font-medium hidden lg:table-cell">อีเมล / เลขภาษี</th>
              <th class="text-center px-4 py-3 text-gray-500 font-medium">จัดการ</th>
            </tr>
          </thead>
          <tbody id="customers-tbody">
            <tr><td colspan="5" class="text-center py-12 text-gray-400 animate-pulse">กำลังโหลด...</td></tr>
          </tbody>
        </table>
      </div>
      <!-- Mobile Cards -->
      <div class="sm:hidden divide-y divide-gray-100" id="customers-cards-mobile">
        <div class="text-center py-10 text-gray-400 text-sm animate-pulse">กำลังโหลด...</div>
      </div>
    </div>
  </div>

  <!-- Modal -->
  <div id="modal" class="hidden fixed inset-0 bg-black/40 flex items-center justify-center z-50 px-4">
    <div class="bg-white rounded-2xl shadow-2xl w-full max-w-md max-h-[90vh] overflow-y-auto">
      <div class="px-6 py-5 border-b border-gray-100 flex items-center justify-between sticky top-0 bg-white rounded-t-2xl">
        <h3 id="modal-title" class="font-bold text-gray-800 text-lg">เพิ่มลูกค้า</h3>
        <button onclick="closeModal()" class="text-gray-400 hover:text-gray-600 text-2xl leading-none">&times;</button>
      </div>
      <div class="px-6 py-5 space-y-4">
        <input type="hidden" id="edit-id"/>

        <div>
          <label class="block text-sm font-medium text-gray-600 mb-1.5">เบอร์โทร (รหัสลูกค้า) <span class="text-red-500">*</span></label>
          <input id="f-phone" type="tel" placeholder="เช่น 081-234-5678"
            class="w-full px-3 py-2.5 border border-gray-200 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-green-500"/>
          <p class="text-xs text-gray-400 mt-1">ใช้เบอร์โทรเป็นรหัสค้นหาลูกค้า — ห้ามซ้ำกัน</p>
        </div>

        <div>
          <label class="block text-sm font-medium text-gray-600 mb-1.5">ชื่อลูกค้า <span class="text-red-500">*</span></label>
          <input id="f-name" type="text" placeholder="ชื่อ-นามสกุล หรือชื่อบริษัท"
            class="w-full px-3 py-2.5 border border-gray-200 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-green-500"/>
        </div>

        <div>
          <label class="block text-sm font-medium text-gray-600 mb-1.5">ที่อยู่</label>
          <textarea id="f-address" rows="2" placeholder="ที่อยู่จัดส่ง"
            class="w-full px-3 py-2.5 border border-gray-200 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-green-500 resize-none"></textarea>
        </div>

        <div class="grid grid-cols-2 gap-3">
          <div>
            <label class="block text-sm font-medium text-gray-600 mb-1.5">อีเมล</label>
            <input id="f-email" type="email" placeholder="example@email.com"
              class="w-full px-3 py-2.5 border border-gray-200 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-green-500"/>
          </div>
          <div>
            <label class="block text-sm font-medium text-gray-600 mb-1.5">เลขผู้เสียภาษี</label>
            <input id="f-tax" type="text" placeholder="0000000000000"
              class="w-full px-3 py-2.5 border border-gray-200 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-green-500"/>
          </div>
        </div>

        <div>
          <label class="block text-sm font-medium text-gray-600 mb-1.5">หมายเหตุ</label>
          <input id="f-note" type="text" placeholder="บันทึกเพิ่มเติม (ถ้ามี)"
            class="w-full px-3 py-2.5 border border-gray-200 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-green-500"/>
        </div>
      </div>
      <div class="px-6 py-4 border-t border-gray-100 flex gap-3">
        <button onclick="closeModal()" class="flex-1 px-4 py-2.5 border border-gray-200 text-gray-600 rounded-xl hover:bg-gray-50 transition text-sm">ยกเลิก</button>
        <button onclick="saveCustomer()" class="flex-1 px-4 py-2.5 bg-green-700 text-white rounded-xl hover:bg-green-800 transition text-sm font-medium">บันทึก</button>
      </div>
    </div>
  </div>

  <script>
    const SUPABASE_URL = 'https://ygdcbkhaqsaiyymxvrph.supabase.co'
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InlnZGNia2hhcXNhaXl5bXh2cnBoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMwMzY4NTMsImV4cCI6MjA4ODYxMjg1M30.1quRttxAsp4b9471rdUh0zkdx97tfK9pW__0Bh3RWY0'
    const { createClient } = supabase
    const sb = createClient(SUPABASE_URL, SUPABASE_ANON_KEY)

    let allCustomers = []
    let currentUserId = null

    async function init() {
      const { data: { session } } = await sb.auth.getSession()
      if (!session) { window.location.href = 'index.html'; return }
      currentUserId = session.user.id
      await loadCustomers()
    }

    async function loadCustomers() {
      const { data, error } = await sb.from('customers')
        .select('*')
        .order('name')
      if (error) { showAlert('โหลดข้อมูลไม่สำเร็จ: ' + error.message); return }
      allCustomers = data || []
      renderTable(allCustomers)
    }

    function filterCustomers() {
      const q = document.getElementById('search').value.toLowerCase()
      renderTable(allCustomers.filter(c =>
        c.phone.toLowerCase().includes(q) || c.name.toLowerCase().includes(q)
      ))
    }

    function renderTable(customers) {
      const tbody     = document.getElementById('customers-tbody')
      const mobileDiv = document.getElementById('customers-cards-mobile')

      if (!customers.length) {
        tbody.innerHTML     = `<tr><td colspan="5" class="text-center py-12 text-gray-400">ไม่พบลูกค้า</td></tr>`
        mobileDiv.innerHTML = `<div class="text-center py-10 text-gray-400 text-sm">ไม่พบลูกค้า</div>`
        return
      }

      tbody.innerHTML = customers.map(c => `
        <tr class="border-b border-gray-50 hover:bg-gray-50 transition">
          <td class="px-4 py-3 font-mono font-semibold text-green-700 text-sm">${esc(c.phone)}</td>
          <td class="px-4 py-3 font-medium text-gray-800 text-sm">${esc(c.name)}</td>
          <td class="px-4 py-3 text-gray-500 text-sm hidden md:table-cell">${c.address ? esc(c.address) : '<span class="text-gray-300">—</span>'}</td>
          <td class="px-4 py-3 text-gray-500 text-sm hidden lg:table-cell">
            ${c.email ? `<span class="block">${esc(c.email)}</span>` : ''}
            ${c.tax_id ? `<span class="block text-xs text-gray-400">${esc(c.tax_id)}</span>` : ''}
            ${!c.email && !c.tax_id ? '<span class="text-gray-300">—</span>' : ''}
          </td>
          <td class="px-4 py-3 text-center">
            <div class="flex items-center justify-center gap-3">
              <button onclick="editCustomer('${c.id}')" class="text-blue-500 hover:text-blue-700 text-xs font-medium">แก้ไข</button>
              <span class="text-gray-300">|</span>
              <button onclick="deleteCustomer('${c.id}', '${esc(c.name)}')" class="text-red-400 hover:text-red-600 text-xs font-medium">ลบ</button>
            </div>
          </td>
        </tr>`).join('')

      mobileDiv.innerHTML = customers.map(c => `
        <div class="p-4">
          <div class="flex items-start justify-between mb-1.5">
            <div class="flex-1 min-w-0">
              <div class="flex items-center gap-2 mb-0.5">
                <span class="font-mono text-xs font-semibold text-green-700 bg-green-50 px-2 py-0.5 rounded">${esc(c.phone)}</span>
              </div>
              <p class="font-semibold text-gray-800 text-sm">${esc(c.name)}</p>
              ${c.address ? `<p class="text-xs text-gray-500 mt-0.5 truncate">${esc(c.address)}</p>` : ''}
              ${c.note ? `<p class="text-xs text-gray-400 mt-0.5">${esc(c.note)}</p>` : ''}
            </div>
          </div>
          <div class="flex justify-end gap-4 mt-2">
            <button onclick="editCustomer('${c.id}')" class="text-blue-500 text-xs font-semibold py-1 px-3 border border-blue-200 rounded-lg">แก้ไข</button>
            <button onclick="deleteCustomer('${c.id}', '${esc(c.name)}')" class="text-red-400 text-xs font-semibold py-1 px-3 border border-red-200 rounded-lg">ลบ</button>
          </div>
        </div>`).join('')
    }

    function openModal(clear = true) {
      if (clear) {
        document.getElementById('modal-title').textContent = 'เพิ่มลูกค้า'
        document.getElementById('edit-id').value = ''
        ;['phone','name','address','email','tax','note'].forEach(f => document.getElementById('f-'+f).value = '')
      }
      document.getElementById('modal').classList.remove('hidden')
      document.getElementById('f-phone').focus()
    }

    function closeModal() {
      document.getElementById('modal').classList.add('hidden')
    }

    function editCustomer(id) {
      const c = allCustomers.find(x => x.id === id)
      if (!c) return
      document.getElementById('modal-title').textContent = 'แก้ไขลูกค้า'
      document.getElementById('edit-id').value    = c.id
      document.getElementById('f-phone').value   = c.phone
      document.getElementById('f-name').value    = c.name
      document.getElementById('f-address').value = c.address || ''
      document.getElementById('f-email').value   = c.email || ''
      document.getElementById('f-tax').value     = c.tax_id || ''
      document.getElementById('f-note').value    = c.note || ''
      openModal(false)
    }

    async function saveCustomer() {
      const id      = document.getElementById('edit-id').value
      const phone   = document.getElementById('f-phone').value.trim()
      const name    = document.getElementById('f-name').value.trim()
      const address = document.getElementById('f-address').value.trim()
      const email   = document.getElementById('f-email').value.trim()
      const taxId   = document.getElementById('f-tax').value.trim()
      const note    = document.getElementById('f-note').value.trim()

      if (!phone || !name) {
        showAlert('กรุณากรอกเบอร์โทรและชื่อลูกค้า')
        return
      }

      const payload = {
        user_id: currentUserId, phone, name,
        address: address || null,
        email:   email   || null,
        tax_id:  taxId   || null,
        note:    note    || null,
        updated_at: new Date().toISOString()
      }

      let error
      if (id) {
        ;({ error } = await sb.from('customers').update(payload).eq('id', id))
      } else {
        ;({ error } = await sb.from('customers').insert(payload))
      }

      if (error) {
        showAlert(error.code === '23505' ? 'เบอร์โทรนี้มีในระบบแล้ว' : 'บันทึกไม่สำเร็จ: ' + error.message)
        return
      }

      closeModal()
      showAlert(id ? 'แก้ไขลูกค้าเรียบร้อย' : 'เพิ่มลูกค้าเรียบร้อย', 'success')
      await loadCustomers()
    }

    async function deleteCustomer(id, name) {
      if (!confirm(`ยืนยันลบลูกค้า "${name}" ?`)) return
      const { error } = await sb.from('customers').delete().eq('id', id)
      if (error) { showAlert('ลบไม่สำเร็จ: ' + error.message); return }
      showAlert('ลบลูกค้าเรียบร้อย', 'success')
      await loadCustomers()
    }

    function showAlert(msg, type = 'error') {
      const el = document.getElementById('alert')
      el.className = `mb-4 px-4 py-3 rounded-lg text-sm ${type === 'error' ? 'bg-red-50 text-red-700 border border-red-200' : 'bg-green-50 text-green-700 border border-green-200'}`
      el.textContent = msg
      el.classList.remove('hidden')
      if (type === 'success') setTimeout(() => el.classList.add('hidden'), 3000)
    }

    function esc(str) {
      return String(str || '').replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    }

    async function logout() {
      await sb.auth.signOut(); window.location.href = 'index.html'
    }

    document.getElementById('modal').addEventListener('click', e => {
      if (e.target === document.getElementById('modal')) closeModal()
    })

    init()
  </script>
</body>
</html>
