<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>จัดการสินค้า — Kang Bang</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
  <style>body { font-family: 'Sarabun', sans-serif; }</style>
</head>
<body class="bg-gray-50 min-h-screen">

  <!-- Navbar -->
  <nav class="bg-green-800 text-white shadow-lg sticky top-0 z-10">
    <div class="max-w-7xl mx-auto px-4 py-3 flex items-center justify-between">
      <div class="flex items-center gap-3">
        <a href="dashboard.html" class="text-green-300 hover:text-white transition">← กลับ</a>
        <span class="text-green-500">|</span>
        <span class="text-2xl">📦</span>
        <span class="font-bold">จัดการสินค้า</span>
      </div>
      <button onclick="logout()" class="text-sm bg-green-700 hover:bg-green-600 px-3 py-1.5 rounded-lg transition">ออกจากระบบ</button>
    </div>
  </nav>

  <div class="max-w-5xl mx-auto px-4 py-6">

    <!-- Header -->
    <div class="flex items-center justify-between mb-6">
      <div>
        <h1 class="text-2xl font-bold text-gray-800">ฐานข้อมูลสินค้า</h1>
        <p class="text-gray-500 text-sm">ใช้ร่วมกันทั้งทีม</p>
      </div>
      <button onclick="openModal()"
        class="flex items-center gap-2 px-4 py-2 bg-green-700 text-white rounded-xl hover:bg-green-800 transition text-sm font-medium">
        + เพิ่มสินค้า
      </button>
    </div>

    <!-- Search -->
    <div class="bg-white rounded-xl shadow-sm border border-gray-100 p-4 mb-4">
      <input id="search" type="text" placeholder="ค้นหารหัสสินค้า หรือชื่อสินค้า..."
        class="w-full px-4 py-2 border border-gray-200 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-green-500"
        oninput="filterProducts()"/>
    </div>

    <!-- Alert -->
    <div id="alert" class="hidden mb-4 px-4 py-3 rounded-lg text-sm"></div>

    <!-- Table (Desktop) / Cards (Mobile) -->
    <div class="bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden">
      <!-- Desktop -->
      <div class="hidden sm:block overflow-x-auto">
        <table class="w-full text-sm">
          <thead>
            <tr class="bg-gray-50 border-b border-gray-100">
              <th class="text-left px-4 py-3 text-gray-500 font-medium">รหัส</th>
              <th class="text-left px-4 py-3 text-gray-500 font-medium">ชื่อสินค้า</th>
              <th class="text-left px-4 py-3 text-gray-500 font-medium hidden md:table-cell">รายละเอียด</th>
              <th class="text-center px-4 py-3 text-gray-500 font-medium">หน่วย</th>
              <th class="text-right px-4 py-3 text-gray-500 font-medium">ราคา/หน่วย</th>
              <th class="text-center px-4 py-3 text-gray-500 font-medium">จัดการ</th>
            </tr>
          </thead>
          <tbody id="products-tbody">
            <tr><td colspan="6" class="text-center py-12 text-gray-400 animate-pulse">กำลังโหลด...</td></tr>
          </tbody>
        </table>
      </div>
      <!-- Mobile Cards -->
      <div class="sm:hidden divide-y divide-gray-100" id="products-cards-mobile">
        <div class="text-center py-10 text-gray-400 text-sm animate-pulse">กำลังโหลด...</div>
      </div>
    </div>
  </div>

  <!-- Modal -->
  <div id="modal" class="hidden fixed inset-0 bg-black/40 flex items-center justify-center z-50 px-4">
    <div class="bg-white rounded-2xl shadow-2xl w-full max-w-md">
      <div class="px-6 py-5 border-b border-gray-100 flex items-center justify-between">
        <h3 id="modal-title" class="font-bold text-gray-800 text-lg">เพิ่มสินค้า</h3>
        <button onclick="closeModal()" class="text-gray-400 hover:text-gray-600 text-xl leading-none">&times;</button>
      </div>
      <div class="px-6 py-5 space-y-4">
        <input type="hidden" id="edit-id"/>
        <div class="grid grid-cols-2 gap-3">
          <div>
            <label class="block text-sm font-medium text-gray-600 mb-1">รหัสสินค้า <span class="text-red-500">*</span></label>
            <input id="f-code" type="text" placeholder="เช่น 110"
              class="w-full px-3 py-2 border border-gray-200 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-green-500"/>
          </div>
          <div>
            <label class="block text-sm font-medium text-gray-600 mb-1">หน่วย <span class="text-red-500">*</span></label>
            <input id="f-unit" type="text" placeholder="เช่น ชิ้น, เมตร"
              class="w-full px-3 py-2 border border-gray-200 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-green-500"/>
          </div>
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-600 mb-1">ชื่อสินค้า <span class="text-red-500">*</span></label>
          <input id="f-name" type="text" placeholder="เช่น ไม้ระแนง 5 ลอน"
            class="w-full px-3 py-2 border border-gray-200 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-green-500"/>
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-600 mb-1">รายละเอียด / ขนาด</label>
          <input id="f-desc" type="text" placeholder="เช่น 40ซม.*290ซม.*5มม."
            class="w-full px-3 py-2 border border-gray-200 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-green-500"/>
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-600 mb-1">ราคา/หน่วย (฿) <span class="text-red-500">*</span></label>
          <input id="f-price" type="number" min="0" step="0.01" placeholder="0.00"
            class="w-full px-3 py-2 border border-gray-200 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-green-500"/>
        </div>
      </div>
      <div class="px-6 py-4 border-t border-gray-100 flex gap-3">
        <button onclick="closeModal()" class="flex-1 px-4 py-2 border border-gray-200 text-gray-600 rounded-xl hover:bg-gray-50 transition text-sm">ยกเลิก</button>
        <button onclick="saveProduct()" class="flex-1 px-4 py-2 bg-green-700 text-white rounded-xl hover:bg-green-800 transition text-sm font-medium">บันทึก</button>
      </div>
    </div>
  </div>

  <script>
    const SUPABASE_URL = 'https://ygdcbkhaqsaiyymxvrph.supabase.co'
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InlnZGNia2hhcXNhaXl5bXh2cnBoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMwMzY4NTMsImV4cCI6MjA4ODYxMjg1M30.1quRttxAsp4b9471rdUh0zkdx97tfK9pW__0Bh3RWY0'
    const { createClient } = supabase
    const sb = createClient(SUPABASE_URL, SUPABASE_ANON_KEY)

    let allProducts = []

    async function init() {
      const { data: { session } } = await sb.auth.getSession()
      if (!session) { window.location.href = 'index.html'; return }
      await loadProducts()
    }

    async function loadProducts() {
      const { data, error } = await sb.from('products').select('*').order('code')
      if (error) { showAlert('โหลดข้อมูลไม่สำเร็จ'); return }
      allProducts = data || []
      renderTable(allProducts)
    }

    function filterProducts() {
      const q = document.getElementById('search').value.toLowerCase()
      renderTable(allProducts.filter(p =>
        p.code.toLowerCase().includes(q) || p.name.toLowerCase().includes(q)
      ))
    }

    function renderTable(products) {
      const tbody = document.getElementById('products-tbody')
      const mobileDiv = document.getElementById('products-cards-mobile')
      if (!products.length) {
        tbody.innerHTML = `<tr><td colspan="6" class="text-center py-12 text-gray-400">ไม่พบสินค้า</td></tr>`
        mobileDiv.innerHTML = `<div class="text-center py-10 text-gray-400 text-sm">ไม่พบสินค้า</div>`
        return
      }
      tbody.innerHTML = products.map(p => `
        <tr class="border-b border-gray-50 hover:bg-gray-50 transition">
          <td class="px-4 py-3 font-mono font-medium text-gray-800 text-xs">${p.code}</td>
          <td class="px-4 py-3 font-medium text-gray-800 text-sm">${p.name}</td>
          <td class="px-4 py-3 text-gray-500 text-sm hidden md:table-cell">${p.description || '—'}</td>
          <td class="px-4 py-3 text-center text-gray-600 text-sm">${p.unit}</td>
          <td class="px-4 py-3 text-right font-medium text-gray-800 text-sm">฿${Number(p.price).toLocaleString('th-TH', { minimumFractionDigits: 2 })}</td>
          <td class="px-4 py-3 text-center">
            <div class="flex items-center justify-center gap-3">
              <button onclick="editProduct(${JSON.stringify(p).replace(/"/g, '&quot;')})" class="text-blue-500 hover:text-blue-700 text-xs font-medium">แก้ไข</button>
              <span class="text-gray-300">|</span>
              <button onclick="deleteProduct('${p.id}', '${p.name}')" class="text-red-400 hover:text-red-600 text-xs font-medium">ลบ</button>
            </div>
          </td>
        </tr>`).join('')

      mobileDiv.innerHTML = products.map(p => `
        <div class="p-4">
          <div class="flex items-start justify-between mb-1.5">
            <div class="flex-1 min-w-0">
              <div class="flex items-center gap-2 mb-0.5">
                <span class="font-mono text-xs font-semibold text-green-700 bg-green-50 px-2 py-0.5 rounded">${p.code}</span>
                <span class="text-xs text-gray-500">${p.unit}</span>
              </div>
              <p class="font-semibold text-gray-800 text-sm">${p.name}</p>
              ${p.description ? `<p class="text-xs text-gray-500 mt-0.5">${p.description}</p>` : ''}
            </div>
            <div class="text-right flex-shrink-0 ml-3">
              <p class="font-bold text-green-700">฿${Number(p.price).toLocaleString('th-TH', { minimumFractionDigits: 2 })}</p>
            </div>
          </div>
          <div class="flex justify-end gap-4 mt-2">
            <button onclick="editProduct(${JSON.stringify(p).replace(/"/g, '&quot;')})" class="text-blue-500 text-xs font-semibold py-1 px-3 border border-blue-200 rounded-lg">แก้ไข</button>
            <button onclick="deleteProduct('${p.id}', '${p.name}')" class="text-red-400 text-xs font-semibold py-1 px-3 border border-red-200 rounded-lg">ลบ</button>
          </div>
        </div>`).join('')
    }

    function openModal(clear = true) {
      if (clear) {
        document.getElementById('modal-title').textContent = 'เพิ่มสินค้า'
        document.getElementById('edit-id').value = ''
        ;['code','name','desc','unit','price'].forEach(f => document.getElementById('f-'+f).value = '')
        document.getElementById('f-unit').value = 'ชิ้น'
      }
      document.getElementById('modal').classList.remove('hidden')
      document.getElementById('f-code').focus()
    }

    function closeModal() {
      document.getElementById('modal').classList.add('hidden')
    }

    function editProduct(p) {
      document.getElementById('modal-title').textContent = 'แก้ไขสินค้า'
      document.getElementById('edit-id').value  = p.id
      document.getElementById('f-code').value  = p.code
      document.getElementById('f-name').value  = p.name
      document.getElementById('f-desc').value  = p.description || ''
      document.getElementById('f-unit').value  = p.unit
      document.getElementById('f-price').value = p.price
      openModal(false)
    }

    async function saveProduct() {
      const id    = document.getElementById('edit-id').value
      const code  = document.getElementById('f-code').value.trim()
      const name  = document.getElementById('f-name').value.trim()
      const desc  = document.getElementById('f-desc').value.trim()
      const unit  = document.getElementById('f-unit').value.trim()
      const price = parseFloat(document.getElementById('f-price').value)

      if (!code || !name || !unit || isNaN(price)) {
        showAlert('กรุณากรอกข้อมูลให้ครบถ้วน')
        return
      }

      const payload = { code, name, description: desc || null, unit, price }
      let error

      if (id) {
        ;({ error } = await sb.from('products').update(payload).eq('id', id))
      } else {
        ;({ error } = await sb.from('products').insert(payload))
      }

      if (error) {
        showAlert(error.code === '23505' ? 'รหัสสินค้านี้มีอยู่แล้ว' : 'บันทึกไม่สำเร็จ: ' + error.message)
        return
      }

      closeModal()
      showAlert(id ? 'แก้ไขสินค้าเรียบร้อย' : 'เพิ่มสินค้าเรียบร้อย', 'success')
      await loadProducts()
    }

    async function deleteProduct(id, name) {
      if (!confirm(`ยืนยันลบสินค้า "${name}" ?`)) return
      const { error } = await sb.from('products').delete().eq('id', id)
      if (error) { showAlert('ลบไม่สำเร็จ: ' + error.message); return }
      showAlert('ลบสินค้าเรียบร้อย', 'success')
      await loadProducts()
    }

    function showAlert(msg, type = 'error') {
      const el = document.getElementById('alert')
      el.className = `mb-4 px-4 py-3 rounded-lg text-sm ${type === 'error' ? 'bg-red-50 text-red-700 border border-red-200' : 'bg-green-50 text-green-700 border border-green-200'}`
      el.textContent = msg
      el.classList.remove('hidden')
      setTimeout(() => el.classList.add('hidden'), 3000)
    }

    async function logout() {
      await sb.auth.signOut()
      window.location.href = 'index.html'
    }

    // ปิด modal เมื่อคลิกนอก
    document.getElementById('modal').addEventListener('click', e => {
      if (e.target === document.getElementById('modal')) closeModal()
    })

    init()
  </script>
</body>
</html>
